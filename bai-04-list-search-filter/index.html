<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bài 04 - Danh Sách Khóa Học</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <header class="page-header">
    <h1>📚 Danh Sách Khóa Học</h1>
    <p>Tìm kiếm và lọc khóa học phù hợp với bạn</p>
  </header>

  <main class="container">

    <!-- ===== TOOLBAR: Tìm kiếm + Lọc + Sắp xếp ===== -->
    <section class="toolbar">
      <input
        type="text"
        id="searchInput"
        placeholder="🔍 Tìm kiếm theo tên khóa học..."
      />

      <select id="categoryFilter">
        <option value="all">📂 Tất cả danh mục</option>
        <option value="web">🌐 Lập trình Web</option>
        <option value="mobile">📱 Lập trình Mobile</option>
        <option value="data">📊 Data & AI</option>
        <option value="design">🎨 Thiết kế</option>
      </select>

      <select id="sortFilter">
        <option value="default">↕ Mặc định</option>
        <option value="price-asc">💰 Giá tăng dần</option>
        <option value="price-desc">💰 Giá giảm dần</option>
      </select>
    </section>

    <!-- Đếm số kết quả -->
    <p id="resultCount" class="result-count"></p>

    <!-- ===== DANH SÁCH KHÓA HỌC ===== -->
    <section id="itemList" class="item-list"></section>

  </main>

  <footer class="page-footer">
    <p>© 2025 Nguyễn Văn A — Bài 04 Giữa kỳ Lập trình Web</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
